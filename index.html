const HARDCODED_GAS_URL = 'https://script.google.com/macros/s/AKfycbxQ5nbY3Zcjgp0XXYo3FTW-Ep886vmmM4qGDofb6p5fmeBh8c5N8Zv5_rxZfq0bOyPfMg/exec';

// 🔒 帳號密碼（跨裝置同步用，點標題 3 下可叫出登入畫面）
const VALID_ACCOUNT = '72839168';
const VALID_PASSWORD = '85379150';

const LOCAL_USER_KEY = 'wt-user-key';
const LOCAL_ACCOUNT_TYPE = 'wt-account-type'; // 'master' | 'child' | '' (guest)

function getUserKey() {
  let k = localStorage.getItem(LOCAL_USER_KEY);
  if (!k) {
    k = (typeof crypto !== 'undefined' && crypto.randomUUID)
      ? crypto.randomUUID()
      : ('u-' + Date.now() + '-' + Math.random().toString(36).slice(2));
    localStorage.setItem(LOCAL_USER_KEY, k);
  }
  return k;
}

const cloudStorage = {
  get gasUrl() { return HARDCODED_GAS_URL; },
  setGasUrl() { /* no-op, URL is hardcoded */ },
  async get(key) {
    const url = this.gasUrl;
    if (url) {
      try {
        const resp = await fetch(url + '?op=get&user=' + encodeURIComponent(getUserKey()), { cache: 'no-store' });
        if (resp.ok) {
          const data = await resp.json();
          if (data && data.ok && data.payload) {
            const v = JSON.stringify(data.payload);
            localStorage.setItem(key, v);
            return { value: v };
          }
        }
      } catch (e) {
        console.warn('Cloud load failed, using local cache', e);
      }
    }
    const v = localStorage.getItem(key);
    return v ? { value: v } : null;
  },
  async set(key, value) {
    // Save locally first (instant, never fails)
    localStorage.setItem(key, value);
    // Fire-and-forget cloud save
    const url = this.gasUrl;
    if (url) {
      try {
        const payload = JSON.parse(value);
        fetch(url, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ op: 'set', user: getUserKey(), payload }),
        }).catch(e => console.warn('Cloud save failed', e));
      } catch (e) {
        console.warn('Cloud save error', e);
      }
    }
    return { value, key };
  },
};

const STORAGE_KEY = 'weight-tracker-v1';
const DEFAULT_WATER_GOAL = 2000;
const DEFAULT_SODIUM_GOAL = 2000; // mg (WHO)
const DEFAULT_SUGAR_GOAL = 25;    // g (WHO 添加糖)
const DEFAULT_CALORIE_GOAL = 1800;

// ---------- utils ----------
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function nowTime() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function fmtDate(s, withYear = false) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return withYear ? `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}` : `${d.getMonth() + 1}/${d.getDate()}`;
}
function dayOfWeek(s) {
  return ['日','一','二','三','四','五','六'][new Date(s+'T00:00:00').getDay()];
}
function shiftDate(s, delta) {
  const d = new Date(s + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function relativeDayLabel(s) {
  const t = todayStr();
  if (s === t) return '今天';
  if (s === shiftDate(t, -1)) return '昨天';
  if (s === shiftDate(t, 1)) return '明天';
  return null;
}
function suggestTarget(heightCm) {
  const h = parseFloat(heightCm);
  if (!h || h < 100 || h > 250) return null;
  const m = h / 100;
  return {
    recommended: +(22 * m * m).toFixed(1),
    min: +(18.5 * m * m).toFixed(1),
    max: +(24 * m * m).toFixed(1),
  };
}
function suggestCalories(weightKg, heightCm) {
  const w = parseFloat(weightKg), h = parseFloat(heightCm);
  if (!w || !h) return DEFAULT_CALORIE_GOAL;
  // Mifflin-St Jeor averaged across sex/age (~30y)
  const bmr = 10 * w + 6.25 * h - 150;
  const tdee = bmr * 1.4; // light activity
  const target = Math.max(1200, tdee - 500); // 500 cal deficit, floor 1200
  return Math.round(target / 50) * 50;
}

function WeightTracker() {
  const [entries, setEntries] = useState([]);
  const [goal, setGoal] = useState(null);
  const [diary, setDiary] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState('main'); // main | setup | settings | export
  const [tab, setTab] = useState('food');
  const [editingEntry, setEditingEntry] = useState(null);
  const [chartRange, setChartRange] = useState(30);
  const [toast, setToast] = useState(null);
  const [showAccount, setShowAccount] = useState(false);

  const [qWeight, setQWeight] = useState('');
  const [qDate, setQDate] = useState(todayStr());
  const [qNote, setQNote] = useState('');
  const [showNote, setShowNote] = useState(false);

  const [exportFrom, setExportFrom] = useState(shiftDate(todayStr(), -29));
  const [exportTo, setExportTo] = useState(todayStr());

  useEffect(() => {
    (async () => {
      try {
        const r = await cloudStorage.get(STORAGE_KEY);
        if (r?.value) {
          const p = JSON.parse(r.value);
          setEntries(Array.isArray(p.entries) ? p.entries : []);
          setGoal(p.goal || null);
          setDiary(p.diary || {});
          if (!p.goal) setView('setup');
        } else setView('setup');
      } catch {
        setView('setup');
      }
      setLoaded(true);
    })();
  }, []);

  const persist = async (override = {}) => {
    const payload = {
      entries: 'entries' in override ? override.entries : entries,
      goal: 'goal' in override ? override.goal : goal,
      diary: 'diary' in override ? override.diary : diary,
    };
    try { await cloudStorage.set(STORAGE_KEY, JSON.stringify(payload)); }
    catch (e) { console.error('save error', e); }
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 1500);
  };

  const sorted = useMemo(
    () => [...entries].sort((a, b) => a.date.localeCompare(b.date)),
    [entries]
  );
  const latest = sorted[sorted.length - 1];

  const stats = useMemo(() => {
    if (!goal) return null;
    const target = goal.targetWeight;
    const start = goal.startWeight ?? sorted[0]?.weight ?? null;
    const cur = latest?.weight ?? null;
    if (start === null || cur === null) {
      return { start, target, cur, hasData: false, lost: 0, remaining: 0, progress: 0, wkChange: null };
    }
    const lost = +(start - cur).toFixed(1);
    const remaining = +(cur - target).toFixed(1);
    const totalToLose = start - target;
    const progress = totalToLose > 0 ? Math.max(0, Math.min(1, lost / totalToLose)) : (cur <= target ? 1 : 0);

    const now = new Date();
    const d7 = new Date(now); d7.setDate(now.getDate() - 7);
    const d14 = new Date(now); d14.setDate(now.getDate() - 14);
    const thisWk = sorted.filter(e => new Date(e.date) >= d7);
    const lastWk = sorted.filter(e => { const dt = new Date(e.date); return dt >= d14 && dt < d7; });
    const avg = arr => arr.length ? arr.reduce((s, e) => s + e.weight, 0) / arr.length : null;
    const wkChange = (avg(thisWk) !== null && avg(lastWk) !== null) ? +(avg(thisWk) - avg(lastWk)).toFixed(2) : null;

    return { start, target, cur, hasData: true, lost, remaining, progress, wkChange };
  }, [sorted, latest, goal]);

  const chartData = useMemo(() => {
    if (!sorted.length) return [];
    let filtered = sorted;
    if (chartRange !== 0) {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - chartRange);
      filtered = sorted.filter(e => new Date(e.date) >= cutoff);
    }
    return filtered.map(e => ({ date: e.date, label: fmtDate(e.date), weight: e.weight }));
  }, [sorted, chartRange]);

  // -------- handlers --------
  const recordWeight = async () => {
    const w = parseFloat(qWeight);
    if (!w || w <= 0 || w > 500) { showToast('請輸入有效的體重'); return; }
    const i = entries.findIndex(e => e.date === qDate);
    let newEntries;
    if (i >= 0) {
      newEntries = [...entries];
      newEntries[i] = { ...newEntries[i], weight: w, note: qNote || newEntries[i].note || '' };
      showToast('已更新');
    } else {
      newEntries = [...entries, { id: Date.now(), date: qDate, weight: w, note: qNote }];
      showToast('紀錄完成');
    }
    setEntries(newEntries);
    await persist({ entries: newEntries });
    setQWeight(''); setQNote(''); setShowNote(false); setQDate(todayStr());
  };
  const updateEntry = async (id, updates) => {
    const ne = entries.map(e => e.id === id ? { ...e, ...updates } : e);
    setEntries(ne); await persist({ entries: ne });
  };
  const deleteEntry = async (id) => {
    const ne = entries.filter(e => e.id !== id);
    setEntries(ne); await persist({ entries: ne });
    setEditingEntry(null); showToast('已刪除');
  };

  const completeSetup = async ({ name, height, currentWeight, targetWeight }) => {
    const h = parseFloat(height);
    const w = currentWeight ? parseFloat(currentWeight) : null;
    const t = parseFloat(targetWeight);
    const newGoal = {
      name: name.trim(),
      height: h,
      startWeight: w,
      targetWeight: t,
      startDate: todayStr(),
      waterGoal: DEFAULT_WATER_GOAL,
      calorieGoal: suggestCalories(w, h),
      sodiumGoal: DEFAULT_SODIUM_GOAL,
      sugarGoal: DEFAULT_SUGAR_GOAL,
    };
    setGoal(newGoal);
    let ne = entries;
    if (w && !entries.length) {
      ne = [{ id: Date.now(), date: todayStr(), weight: w, note: '起始紀錄' }];
      setEntries(ne);
    }
    await persist({ entries: ne, goal: newGoal });
    setView('main');
  };

  const updateDay = async (date, updates) => {
    const cur = diary[date] || { water: 0, meals: [], drinks: [] };
    const next = { ...cur, ...updates };
    const newDiary = { ...diary, [date]: next };
    setDiary(newDiary);
    await persist({ diary: newDiary });
  };

  if (!loaded) {
    return (
      <div style={{ background: C.bg, minHeight: '100vh' }} className="sans flex items-center justify-center">
        <style>{FONT_CSS}</style>
        <div style={{ color: C.mute }} className="text-sm">載入中⋯</div>
      </div>
    );
  }

  return (
    <div style={{ background: C.bg, color: C.ink, minHeight: '100vh' }} className="sans">
      <style>{FONT_CSS}</style>

      <div className="max-w-md mx-auto px-5 pt-6 pb-32 no-print">
        {view === 'setup' && <SetupView onComplete={completeSetup} />}
        {view === 'settings' && (
          <SettingsView
            goal={goal} entries={entries} diary={diary}
            onBack={() => setView('main')}
            onSave={async (newGoal) => { setGoal(newGoal); await persist({ goal: newGoal }); showToast('已更新'); }}
            onReset={async () => { setEntries([]); setGoal(null); setDiary({}); await persist({ entries: [], goal: null, diary: {} }); setView('setup'); }}
          />
        )}
        {view === 'export' && (
          <ExportView
            goal={goal} entries={entries} diary={diary}
            from={exportFrom} setFrom={setExportFrom}
            to={exportTo} setTo={setExportTo}
            onBack={() => setView('main')}
            showToast={showToast}
          />
        )}
        {view === 'main' && (
          <>
            <Header
              goal={goal}
              tab={tab} setTab={setTab}
              onOpenSettings={() => setView('settings')}
              onOpenExport={() => setView('export')}
              onTripleTap={() => setShowAccount(true)}
            />
            {tab === 'weight' && (
              <WeightView
                goal={goal} stats={stats} sorted={sorted} latest={latest}
                chartData={chartData} chartRange={chartRange} setChartRange={setChartRange}
                qWeight={qWeight} setQWeight={setQWeight}
                qDate={qDate} setQDate={setQDate}
                qNote={qNote} setQNote={setQNote}
                showNote={showNote} setShowNote={setShowNote}
                recordWeight={recordWeight}
                onOpenEntry={setEditingEntry}
              />
            )}
            {tab === 'food' && (
              <FoodView diary={diary} goal={goal} updateDay={updateDay} showToast={showToast} />
            )}
          </>
        )}
      </div>

      {editingEntry && (
        <EditEntryModal
          entry={editingEntry}
          onClose={() => setEditingEntry(null)}
          onSave={async (id, updates) => { await updateEntry(id, updates); setEditingEntry(null); showToast('已儲存'); }}
          onDelete={deleteEntry}
        />
      )}

      {showAccount && (
        <AccountModal
          onClose={() => setShowAccount(false)}
          showToast={showToast}
        />
      )}

      {toast && (
        <div className="fixed left-1/2 -translate-x-1/2 bottom-8 px-5 py-3 rounded-full pop text-sm font-medium z-50 no-print"
          style={{ background: C.flame, color: 'white', boxShadow: '0 10px 30px rgba(255,107,31,.4)' }}>
          {toast}
        </div>
      )}

      {/* Print area rendered OUTSIDE no-print wrapper so @media print can show it */}
      {view === 'export' && goal && (() => {
        const inRange = d => d >= exportFrom && d <= exportTo;
        const weights = entries.filter(e => inRange(e.date)).sort((a, b) => a.date.localeCompare(b.date));
        const days = Object.keys(diary || {}).filter(d => inRange(d)).sort();
        const diaryRows = days.map(d => ({ date: d, ...diary[d] }));
        return <PrintArea goal={goal} from={exportFrom} to={exportTo} weights={weights} diary={diaryRows} />;
      })()}
    </div>
  );
}

function Header({ goal, tab, setTab, onOpenSettings, onOpenExport, onTripleTap }) {
  const tapsRef = useRef([]);
  const handleTitleTap = () => {
    const now = Date.now();
    tapsRef.current = tapsRef.current.filter(t => now - t < 800);
    tapsRef.current.push(now);
    if (tapsRef.current.length >= 3) {
      tapsRef.current = [];
      if (onTripleTap) onTripleTap();
    }
  };
  return (
    <div className="mb-5">
      <div className="flex items-center justify-between pt-1">
        <div>
          <div className="flex items-center gap-2">
            <Flame size={18} style={{ color: C.flame }} className="flicker" strokeWidth={2.5} />
            <div className="text-[11px] upper font-semibold" style={{ color: C.flame }}>
              {goal?.name ? `HI, ${goal.name}` : 'WELCOME'}
            </div>
          </div>
          <div onClick={handleTitleTap}
            className="disp text-4xl font-bold mt-1.5 leading-none select-none cursor-pointer">健康日誌</div>
          <div className="text-[11px] num upper mt-1.5" style={{ color: C.mute }}>
            {todayStr().replace(/-/g, ' / ')} · {dayOfWeek(todayStr())}
          </div>
        </div>
        <div className="flex flex-col gap-1.5">
          <button onClick={onOpenExport}
            className="w-9 h-9 rounded-xl flex items-center justify-center"
            style={{ background: C.card, border: `1px solid ${C.border}` }}>
            <Download size={14} strokeWidth={2.2} style={{ color: C.inkSoft }} />
          </button>
          <button onClick={onOpenSettings}
            className="w-9 h-9 rounded-xl flex items-center justify-center"
            style={{ background: C.card, border: `1px solid ${C.border}` }}>
            <SettingsIcon size={14} strokeWidth={2.2} style={{ color: C.inkSoft }} />
          </button>
        </div>
      </div>

      <div className="flex gap-1 mt-5 p-1 rounded-2xl" style={{ background: C.card, border: `1px solid ${C.border}` }}>
        {[

function FoodView({ diary, goal, updateDay, showToast }) {
  const [date, setDate] = useState(todayStr());
  const day = diary[date] || { water: 0, meals: [], drinks: [] };
  const [mealModal, setMealModal] = useState(null);
  const [drinkModal, setDrinkModal] = useState(null);
  const [customWaterOpen, setCustomWaterOpen] = useState(false);

  const totals = useMemo(() => {
    const sum = (items, key) => (items || []).reduce((s, x) => s + (parseFloat(x[key]) || 0), 0);
    const cal = sum(day.meals, 'calories') + sum(day.drinks, 'calories');
    const sod = sum(day.meals, 'sodium') + sum(day.drinks, 'sodium');
    const sug = sum(day.meals, 'sugar') + sum(day.drinks, 'sugar');
    return { cal, sod, sug };
  }, [day]);

  const addWater = (a) => updateDay(date, { water: Math.max(0, Math.min(20000, (day.water || 0) + a)) });
  const setWater = (a) => updateDay(date, { water: Math.max(0, Math.min(20000, a)) });

  const saveMeal = (meal) => {
    let meals = [...(day.meals || [])];
    const i = meals.findIndex(m => m.id === meal.id);
    if (i >= 0) meals[i] = meal; else meals.push(meal);
    meals.sort((a, b) => (a.time || '99').localeCompare(b.time || '99'));
    updateDay(date, { meals });
    setMealModal(null); showToast(i >= 0 ? '已更新' : '已記錄');
  };
  const deleteMeal = (id) => {
    updateDay(date, { meals: (day.meals || []).filter(m => m.id !== id) });
    setMealModal(null); showToast('已刪除');
  };
  const saveDrink = (drink) => {
    let drinks = [...(day.drinks || [])];
    const i = drinks.findIndex(d => d.id === drink.id);
    if (i >= 0) drinks[i] = drink; else drinks.push(drink);
    drinks.sort((a, b) => (a.time || '99').localeCompare(b.time || '99'));
    updateDay(date, { drinks });
    setDrinkModal(null); showToast(i >= 0 ? '已更新' : '已記錄');
  };
  const deleteDrink = (id) => {
    updateDay(date, { drinks: (day.drinks || []).filter(d => d.id !== id) });
    setDrinkModal(null); showToast('已刪除');
  };

  return (
    <div className="space-y-4 slide-up">
      <DateNavigator date={date} setDate={setDate} />

      <NutritionSummary
        cal={totals.cal} sod={totals.sod} sug={totals.sug} water={day.water || 0}
        calGoal={goal?.calorieGoal || DEFAULT_CALORIE_GOAL}
        sodGoal={goal?.sodiumGoal || DEFAULT_SODIUM_GOAL}
        sugGoal={goal?.sugarGoal || DEFAULT_SUGAR_GOAL}
        waterGoal={goal?.waterGoal || DEFAULT_WATER_GOAL}
      />

      <WaterCard
        water={day.water || 0}
        goal={goal?.waterGoal || DEFAULT_WATER_GOAL}
        onAdd={addWater} onCustom={() => setCustomWaterOpen(true)}
      />

      <Section
        icon={<UtensilsCrossed size={13} style={{ color: C.mute }} />}
        title="餐點"
        meta={(day.meals || []).length > 0 ? `${day.meals.length} 餐` : null}
        action={
          <button onClick={() => setMealModal({ mode: 'new' })}
            className="text-xs px-3 py-1.5 rounded-lg font-semibold flex items-center gap-1 upper"
            style={{ background: C.flame, color: 'white' }}>
            <Plus size={11} strokeWidth={3} /> 新增
          </button>
        }>
        {(day.meals || []).length === 0 ? (
          <EmptyHint text="尚未記錄餐點" />
        ) : (
          <div className="rounded-2xl overflow-hidden" style={{ background: C.card, border: `1px solid ${C.border}` }}>
            {day.meals.map((m, i) => (
              <button key={m.id} onClick={() => setMealModal({ mode: 'edit', meal: m })}
                className="w-full text-left px-5 py-4 active:bg-white/[.03] transition-colors"
                style={{ borderTop: i === 0 ? 'none' : `1px solid ${C.borderSoft}` }}>
                <div className="flex items-baseline gap-2 mb-1">
                  <div className="disp text-base font-bold">{m.name || '未命名'}</div>
                  {m.time && (
                    <div className="text-[10px] num flex items-center gap-1" style={{ color: C.mute }}>
                      <Clock size={9} /> {m.time}
                    </div>
                  )}
                  <Edit3 size={11} style={{ color: C.dim }} className="ml-auto" />
                </div>
                {m.content && (
                  <div className="text-sm leading-relaxed whitespace-pre-wrap" style={{ color: C.inkSoft }}>
                    {m.content}
                  </div>
                )}
                {(m.calories || m.sodium || m.sugar) && (
                  <div className="flex gap-3 mt-2 text-[10px] num upper" style={{ color: C.mute }}>
                    {m.calories ? <span>🔥 {m.calories} kcal</span> : null}
                    {m.sodium ? <span>· 鈉 {m.sodium}mg</span> : null}
                    {m.sugar ? <span>· 糖 {m.sugar}g</span> : null}
                  </div>
                )}
              </button>
            ))}
          </div>
        )}
      </Section>

      <Section
        icon={<Coffee size={13} style={{ color: C.mute }} />}
        title="飲料"
        meta={(day.drinks || []).length > 0 ? `共 ${(day.drinks || []).reduce((s, d) => s + (d.amount || 0), 0)} cc` : null}
        action={
          <button onClick={() => setDrinkModal({ mode: 'new' })}
            className="text-xs px-3 py-1.5 rounded-lg font-semibold flex items-center gap-1 upper"
            style={{ background: C.flame, color: 'white' }}>
            <Plus size={11} strokeWidth={3} /> 新增
          </button>
        }>
        {(day.drinks || []).length === 0 ? (
          <EmptyHint text="尚未記錄飲料" />
        ) : (
          <div className="rounded-2xl overflow-hidden" style={{ background: C.card, border: `1px solid ${C.border}` }}>
            {day.drinks.map((d, i) => (
              <button key={d.id} onClick={() => setDrinkModal({ mode: 'edit', drink: d })}
                className="w-full text-left px-5 py-3.5 active:bg-white/[.03] transition-colors flex items-center gap-3"
                style={{ borderTop: i === 0 ? 'none' : `1px solid ${C.borderSoft}` }}>
                <div className="w-9 h-9 rounded-xl flex items-center justify-center shrink-0"
                  style={{ background: C.cardSoft, border: `1px solid ${C.borderSoft}` }}>
                  <GlassWater size={14} style={{ color: C.glow }} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold truncate">{d.name || '飲料'}</div>
                  <div className="flex gap-2 mt-0.5 text-[10px] num" style={{ color: C.mute }}>
                    {d.time && <span>{d.time}</span>}
                    {d.calories ? <span>· 🔥 {d.calories}</span> : null}
                    {d.sugar ? <span>· 糖 {d.sugar}g</span> : null}
                  </div>
                </div>
                <div className="text-right">
                  <div className="disp text-lg font-bold num">{d.amount}</div>
                  <div className="text-[9px]" style={{ color: C.mute }}>cc</div>
                </div>
              </button>
            ))}
          </div>
        )}
      </Section>

      {mealModal && (
        <MealModal mode={mealModal.mode} meal={mealModal.meal}
          onClose={() => setMealModal(null)} onSave={saveMeal} onDelete={deleteMeal} />
      )}
      {drinkModal && (
        <DrinkModal mode={drinkModal.mode} drink={drinkModal.drink}
          onClose={() => setDrinkModal(null)} onSave={saveDrink} onDelete={deleteDrink} />
      )}
      {customWaterOpen && (
        <CustomWaterModal current={day.water || 0}
          onClose={() => setCustomWaterOpen(false)}
          onSet={(v) => { setWater(v); setCustomWaterOpen(false); showToast('已更新'); }} />
      )}
    </div>
  );
}

// ============================================================
// NUTRITION SUMMARY (today's totals vs goals)
// ============================================================
function NutritionSummary({ cal, sod, sug, water, calGoal, sodGoal, sugGoal, waterGoal }) {
  const calPct = Math.min(1, cal / calGoal);
  const calRemain = Math.max(0, calGoal - cal);
  const overCal = cal > calGoal;

  return (
    <div className="rounded-2xl p-5 glow-flame"
      style={{
        background: `linear-gradient(135deg, ${C.card} 0%, ${C.cardSoft} 70%, ${C.cardLift} 100%)`,
        border: `1px solid ${C.border}`,
      }}>
      <div className="flex items-center gap-2 mb-4">
        <Flame size={14} style={{ color: C.flame }} className="flicker" strokeWidth={2.5} />
        <div className="text-[11px] upper font-bold" style={{ color: C.flame }}>今日燃燒目標</div>
      </div>

      <div className="flex items-center gap-5">
        <ProgressRing
          value={cal} max={calGoal}
          size={104} stroke={9}
          color={overCal ? C.ember : C.flame}
          bg={C.borderSoft}
        />
        <div className="flex-1 min-w-0">
          <div className="disp text-5xl font-bold num leading-none">{Math.round(cal)}</div>
          <div className="text-xs mt-1" style={{ color: C.mute }}>
            <span className="num">/ {calGoal}</span> kcal
          </div>
          <div className="text-[11px] mt-1.5 num font-semibold" style={{ color: overCal ? C.ember : C.ok }}>
            {overCal ? `超出 ${Math.round(cal - calGoal)} kcal` : `還可吃 ${Math.round(calRemain)} kcal`}
          </div>
        </div>
      </div>

      <div className="mt-5 space-y-3">
        <NutRow label="鈉" cur={sod} max={sodGoal} unit="mg" color={C.glow} warnAt={1} />
        <NutRow label="糖" cur={sug} max={sugGoal} unit="g" color={C.ember} warnAt={1} />
        <NutRow label="水" cur={water} max={waterGoal} unit="cc" color={C.cool} warnAt={null} />
      </div>
    </div>
  );
}

function NutRow({ label, cur, max, unit, color, warnAt }) {
  const pct = Math.min(1.2, cur / max);
  const over = warnAt !== null && cur > max * warnAt;
  return (
    <div>
      <div className="flex items-baseline justify-between mb-1">
        <span className="text-[11px] upper font-bold" style={{ color: C.inkSoft }}>{label}</span>
        <span className="text-[11px] num" style={{ color: over ? C.ember : C.mute }}>
          <span className="font-semibold" style={{ color: over ? C.ember : C.ink }}>{Math.round(cur)}</span>
          <span> / {max} {unit}</span>
        </span>
      </div>
      <div className="h-1.5 rounded-full overflow-hidden" style={{ background: C.borderSoft }}>
        <div className="h-full rounded-full transition-all duration-500"
          style={{
            width: `${Math.min(100, pct * 100)}%`,
            background: over ? `linear-gradient(90deg, ${color}, ${C.ember})` : color,
          }} />
      </div>
    </div>
  );
}

function ProgressRing({ value, max, size = 100, stroke = 8, color, bg }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(1, value / max));
  return (
    <div className="relative shrink-0" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={r} stroke={bg} strokeWidth={stroke} fill="none" />
        <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
          strokeDasharray={c} strokeDashoffset={c * (1 - pct)}
          strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.6s ease-out' }} />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="disp text-xl font-bold num" style={{ color: C.ink }}>{Math.round(pct * 100)}</div>
        <div className="text-[9px] upper" style={{ color: C.mute }}>%</div>
      </div>
    </div>
  );
}

function ChangePill({ value, label }) {
  const isDown = value < 0;
  const isZero = value === 0;
  const color = isZero ? C.mute : (isDown ? C.ok : C.ember);
  const Icon = isZero ? Minus : (isDown ? TrendingDown : TrendingUp);
  return (
    <div className="flex items-center gap-1.5">
      <Icon size={13} style={{ color }} strokeWidth={2.5} />
      <span className="text-sm font-bold num" style={{ color }}>
        {value > 0 ? '+' : ''}{value.toFixed(1)}
      </span>
      <span className="text-[10px] upper" style={{ color: C.mute }}>{label}</span>
    </div>
  );
}

function ReflectionCard({ stats }) {
  const wk = stats.wkChange;
  if (wk === null) return null;
  let icon, title, body, accent;
  if (wk <= -0.3) {
    icon = '🔥'; accent = C.flame;
    title = '本週減少 ' + Math.abs(wk).toFixed(2) + ' kg';
    body = '節奏穩定。維持飲食記錄與睡眠，避免代謝下調。';
  } else if (wk <= 0) {
    icon = '⚡'; accent = C.flameSoft;
    title = '本週微降 ' + Math.abs(wk).toFixed(2) + ' kg';
    body = '方向正確但偏緩。可考慮小幅調整熱量或運動。';
  } else if (wk < 0.5) {
    icon = '💨'; accent = C.glow;
    title = '本週上升 ' + wk.toFixed(2) + ' kg';
    body = '可能是水分波動或週末飲食。觀察 3–4 天再說。';
  } else {
    icon = '⚠️'; accent = C.ember;
    title = '本週上升 ' + wk.toFixed(2) + ' kg';
    body = '回顧近期飲食紀錄，找出可調整的習慣。';
  }
  return (
    <div className="rounded-2xl p-5" style={{ background: C.card, border: `1px solid ${C.border}` }}>
      <div className="flex items-start gap-3">
        <div className="text-2xl leading-none mt-0.5">{icon}</div>
        <div className="flex-1">
          <div className="text-[11px] upper font-semibold mb-1" style={{ color: C.mute }}>本週檢討</div>
          <div className="disp text-lg font-bold" style={{ color: accent }}>{title}</div>
          <div className="text-sm mt-1 leading-relaxed" style={{ color: C.inkSoft }}>{body}</div>
        </div>
      </div>
    </div>
  );
}

function AccountModal({ onClose, showToast }) {
  const currentKey = localStorage.getItem(LOCAL_USER_KEY) || '';
  const accountType = localStorage.getItem(LOCAL_ACCOUNT_TYPE) || '';
  const isMaster = accountType === 'master';
  const isChild = accountType === 'child';

  const [view, setView] = useState('main'); // main | addChild | childDetail
  const [selectedChild, setSelectedChild] = useState(null);

  // Login form
  const [loginAccount, setLoginAccount] = useState('');
  const [loginPassword, setLoginPassword] = useState('');
  const [loginError, setLoginError] = useState('');
  const [loginLoading, setLoginLoading] = useState(false);

  // Children list
  const [children, setChildren] = useState(null); // null=loading

  const loadChildren = async () => {
    setChildren(null);
    try {
      const url = cloudStorage.gasUrl + '?op=listChildren&master=' + encodeURIComponent(VALID_ACCOUNT) + '&masterPw=' + encodeURIComponent(VALID_PASSWORD);
      const resp = await fetch(url, { cache: 'no-store' });
      const data = await resp.json();
      setChildren(data.ok ? (data.children || []) : []);
    } catch (e) {
      console.warn('Load children failed', e);
      setChildren([]);
    }
  };

  useEffect(() => {
    if (isMaster && children === null && view === 'main') loadChildren();
  }, [isMaster, view]);

  const handleLogin = async () => {
    setLoginError('');
    const a = loginAccount.trim();
    const p = loginPassword.trim();
    if (!a || !p) { setLoginError('請輸入帳號密碼'); return; }
    setLoginLoading(true);

    // Try master first
    if (a === VALID_ACCOUNT && p === VALID_PASSWORD) {
      localStorage.setItem(LOCAL_USER_KEY, VALID_ACCOUNT);
      localStorage.setItem(LOCAL_ACCOUNT_TYPE, 'master');
      setTimeout(() => window.location.reload(), 600);
      return;
    }

    // Try child via GAS
    try {
      const url = cloudStorage.gasUrl + '?op=validateLogin&account=' + encodeURIComponent(a) + '&password=' + encodeURIComponent(p);
      const resp = await fetch(url, { cache: 'no-store' });
      const data = await resp.json();
      if (data.ok) {
        localStorage.setItem(LOCAL_USER_KEY, a);
        localStorage.setItem(LOCAL_ACCOUNT_TYPE, 'child');
        // Smart sync
        try {
          const gUrl = cloudStorage.gasUrl + '?op=get&user=' + encodeURIComponent(a);
          const gResp = await fetch(gUrl, { cache: 'no-store' });
          const gData = await gResp.json();
          if (!(gData && gData.ok && gData.payload)) {
            const current = localStorage.getItem(STORAGE_KEY);
            if (current) {
              await fetch(cloudStorage.gasUrl, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ op: 'set', user: a, payload: JSON.parse(current) }),
              });
            }
          }
        } catch (e) { /* ignore */ }
        setTimeout(() => window.location.reload(), 800);
      } else {
        setLoginError('帳號或密碼錯誤');
        setLoginLoading(false);
      }
    } catch (e) {
      setLoginError('連線錯誤，請稍後再試');
      setLoginLoading(false);
    }
  };

  const handleLogout = () => {
    if (!confirm('登出後此裝置會用新的識別碼，看不到雲端資料。確定？')) return;
    const newKey = (typeof crypto !== 'undefined' && crypto.randomUUID)
      ? crypto.randomUUID()
      : ('u-' + Date.now() + '-' + Math.random().toString(36).slice(2));
    localStorage.setItem(LOCAL_USER_KEY, newKey);
    localStorage.removeItem(LOCAL_ACCOUNT_TYPE);
    window.location.reload();
  };

  // Sub-views (sub-modals when adding/viewing children)
  if (view === 'addChild') {
    return <AddChildModal onClose={() => setView('main')}
      onCreated={() => { setView('main'); loadChildren(); if (showToast) showToast('子帳號已建立'); }} />;
  }
  if (view === 'childDetail' && selectedChild) {
    return <ChildDetailModal child={selectedChild}
      onClose={() => { setView('main'); setSelectedChild(null); }}
      onDeleted={() => { setView('main'); setSelectedChild(null); loadChildren(); if (showToast) showToast('已刪除'); }} />;
  }

  // Master view
  if (isMaster) {
    return (
      <ModalShell title="母帳號管理" subtitle="子帳號" onClose={onClose}>
        <div className="rounded-xl p-3 flex items-center gap-2.5 mb-5"
          style={{ background: 'rgba(255,107,31,0.08)', border: `1px solid rgba(255,107,31,0.25)` }}>
          <Flame size={16} style={{ color: C.flame }} strokeWidth={2.5} className="flicker" />
          <div className="flex-1">
            <div className="disp text-lg font-bold num">{VALID_ACCOUNT}</div>
            <div className="text-[10px] upper font-semibold" style={{ color: C.flame }}>母帳號 · MASTER</div>
          </div>
        </div>

        <div className="mb-2.5 flex items-center justify-between">
          <div className="text-[10px] upper font-semibold" style={{ color: C.mute }}>
            子帳號 {children !== null ? `· ${children.length}` : ''}
          </div>
          <button onClick={() => setView('addChild')}
            className="text-xs px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 upper"
            style={{ background: C.flame, color: 'white' }}>
            <Plus size={11} strokeWidth={3} /> 新增
          </button>
        </div>

        {children === null ? (
          <div className="text-center text-sm py-8" style={{ color: C.dim }}>載入中⋯</div>
        ) : children.length === 0 ? (
          <div className="rounded-xl p-6 text-center" style={{ background: C.cardSoft, border: `1px dashed ${C.border}` }}>
            <div className="text-sm" style={{ color: C.dim }}>還沒有子帳號<br />點上面「新增」建立第一個</div>
          </div>
        ) : (
          <div className="rounded-xl overflow-hidden" style={{ background: C.cardSoft, border: `1px solid ${C.border}` }}>
            {children.map((c, i) => {

              return (

                  className="w-full text-left px-4 py-3 flex items-center gap-3 active:bg-white/[.03]"

function AddChildModal({ onClose, onCreated }) {
  const [account, setAccount] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleCreate = async () => {
    setError('');
    const a = account.trim();
    const p = password.trim();
    const n = name.trim();
    if (!a || !p || !n) { setError('請填寫所有欄位'); return; }
    if (a === VALID_ACCOUNT) { setError('此帳號不可使用（母帳號）'); return; }
    setLoading(true);
    try {
      await fetch(cloudStorage.gasUrl, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          op: 'createChild',
          master: VALID_ACCOUNT, masterPw: VALID_PASSWORD,
          account: a, password: p, name: n,
        }),
      });
      // Wait briefly for the server to process
      setTimeout(() => { if (onCreated) onCreated(); }, 1200);
    } catch (e) {
      setError('建立失敗，請稍後再試');
      setLoading(false);
    }
  };

  return (
    <ModalShell title="新增子帳號" subtitle="母帳號管理" onClose={onClose}>
      <div className="space-y-5">
        <div>
          <FieldLabel>名稱</FieldLabel>
          <InputUnderline value={name} onChange={setName} placeholder="例：小明" autoFocus />
        </div>
        <div>
          <FieldLabel>帳號</FieldLabel>
          <input type="text" inputMode="numeric" value={account}
            onChange={e => { setAccount(e.target.value); setError(''); }}
            placeholder="設定帳號（建議數字）"
            className="w-full disp text-2xl font-bold num bg-transparent outline-none pb-2 mt-2"
            style={{ borderBottom: `1.5px solid ${C.border}`, color: C.ink }} />
        </div>
        <div>
          <FieldLabel>密碼</FieldLabel>
          <input type="text" inputMode="numeric" value={password}
            onChange={e => { setPassword(e.target.value); setError(''); }}
            placeholder="設定密碼"
            className="w-full disp text-2xl font-bold num bg-transparent outline-none pb-2 mt-2"
            style={{ borderBottom: `1.5px solid ${C.border}`, color: C.ink }} />
        </div>
        {error && (
          <div className="text-sm font-bold pop flex items-center gap-1.5" style={{ color: C.ember }}>
            <X size={14} strokeWidth={3} /> {error}
          </div>
        )}
        <button onClick={handleCreate}
          disabled={!account.trim() || !password || !name.trim() || loading}
          className="w-full py-3 rounded-xl font-bold text-white upper disabled:opacity-30"
          style={{ background: C.flame, boxShadow: '0 6px 20px rgba(255,107,31,.35)' }}>
          {loading ? '建立中⋯' : '建立'}
        </button>
      </div>
    </ModalShell>
  );
}

function ChildDetailModal({ child, onClose, onDeleted }) {
  const [confirmDel, setConfirmDel] = useState(false);
  const [loading, setLoading] = useState(false);
  const stats = child.stats || {};
  const lastUpdate = stats.lastUpdate
    ? new Date(stats.lastUpdate).toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
    : '從未';

  const handleDelete = async () => {
    setLoading(true);
    try {
      await fetch(cloudStorage.gasUrl, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          op: 'deleteChild',
          master: VALID_ACCOUNT, masterPw: VALID_PASSWORD,
          account: child.account,
        }),
      });
      setTimeout(() => { if (onDeleted) onDeleted(); }, 1200);
    } catch (e) {
      setLoading(false);
    }
  };

  return (
    <ModalShell title={stats.name || child.name || '子帳號'} subtitle={`帳號 ${child.account}`} onClose={onClose}>
      <div className="rounded-xl p-5 space-y-2.5" style={{ background: C.cardSoft, border: `1px solid ${C.border}` }}>
        <DataRow label="姓名" value={stats.name || child.name || '—'} />
        <DataRow label="體重紀錄" value={`${stats.weightCount || 0} 筆`} />
        <DataRow label="飲食紀錄" value={`${stats.diaryDays || 0} 天`} />
        {stats.latestWeight !== null && stats.latestWeight !== undefined && (
          <DataRow label="最新體重" value={`${stats.latestWeight.toFixed(1)} kg`} />
        )}
        {stats.targetWeight !== null && stats.targetWeight !== undefined && (
          <DataRow label="目標體重" value={`${stats.targetWeight.toFixed(1)} kg`} />
        )}
        <DataRow label="最後同步" value={lastUpdate} />

      <div className="mt-6">
        {!confirmDel ? (
          <button onClick={() => setConfirmDel(true)}
            className="w-full py-3 text-sm rounded-xl font-bold upper"
            style={{ color: C.ember, border: `1px solid ${C.border}`, background: C.card }}>
            刪除此子帳號
          </button>
        ) : (
          <div className="rounded-xl p-5" style={{ background: C.card, border: `1px solid ${C.ember}` }}>
            <div className="text-sm font-bold mb-3" style={{ color: C.ember }}>
              確定刪除？帳號和所有資料都會被永久刪除，無法復原。
            </div>
            <div className="flex gap-2">
              <button onClick={() => setConfirmDel(false)}

              <button onClick={handleDelete} disabled={loading}
                className="flex-1 py-2.5 text-sm rounded-lg font-bold text-white"
                style={{ background: C.ember }}>{loading ? '刪除中⋯' : '確定刪除'}</button>
            </div>
          </div>
        )}
      </div>
    </ModalShell>
  );
}

function SettingsView({ goal, entries, diary, onBack, onSave, onReset }) {
  const [name, setName] = useState(goal?.name || '');
  const [height, setHeight] = useState((goal?.height || '').toString());
  const [start, setStart] = useState(goal?.startWeight?.toString() || '');
  const [target, setTarget] = useState(goal?.targetWeight?.toString() || '');
  const [calorieGoal, setCalorieGoal] = useState((goal?.calorieGoal || DEFAULT_CALORIE_GOAL).toString());
  const [sodiumGoal, setSodiumGoal] = useState((goal?.sodiumGoal || DEFAULT_SODIUM_GOAL).toString());
  const [sugarGoal, setSugarGoal] = useState((goal?.sugarGoal || DEFAULT_SUGAR_GOAL).toString());
  const [waterGoal, setWaterGoal] = useState((goal?.waterGoal || DEFAULT_WATER_GOAL).toString());
  const [confirmReset, setConfirmReset] = useState(false);
  const diaryDays = Object.keys(diary || {}).length;
  const [savedGas, setSavedGas] = useState(false);
  const tgtSugg = useMemo(() => suggestTarget(height), [height]);
  const calSugg = useMemo(() => {
    if (!start || !height) return null;
    return suggestCalories(start, height);
  }, [start, height]);

  return (
    <div className="slide-up">
      <div className="flex items-center justify-between mb-6">
        <button onClick={onBack} className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ background: C.card, border: `1px solid ${C.border}` }}>
          <X size={16} style={{ color: C.inkSoft }} />
        </button>
        <div className="disp text-xl font-bold">設定</div>
        <button
          onClick={() => {
            const h = parseFloat(height), t = parseFloat(target);
            const cg = parseInt(calorieGoal), sg = parseInt(sodiumGoal), sug = parseFloat(sugarGoal), wg = parseInt(waterGoal);
            if (t > 0 && h > 0 && cg > 0 && wg > 0) {
              onSave({
                ...goal,
                name: name.trim() || goal?.name || '',
                height: h, startWeight: start ? parseFloat(start) : null,
                targetWeight: t,
                calorieGoal: cg, sodiumGoal: sg, sugarGoal: sug, waterGoal: wg,
              });
              onBack();
            }
          }}
          className="text-sm font-bold upper" style={{ color: C.flame }}>儲存</button>
      </div>

      {/* CLOUD SYNC - top priority */}
      <SettingsGroup label="雲端同步">
        <button onClick={async () => {
            if (savedGas) return;
            setSavedGas(true);
            const url = cloudStorage.gasUrl;
            const current = localStorage.getItem(STORAGE_KEY);
            if (current && url) {
              try {
                const payload = JSON.parse(current);
                await fetch(url, {
                  method: 'POST',
                  mode: 'no-cors',
                  headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                  body: JSON.stringify({ op: 'set', user: getUserKey(), payload }),
                });
              } catch (e) { console.warn('Sync failed', e); }
            }
            setTimeout(() => { setSavedGas(false); }, 1500);
          }}
          disabled={savedGas}
          className="w-full py-3 rounded-xl font-bold text-white upper text-sm disabled:opacity-70 flex items-center justify-center gap-2"
          style={{ background: C.flame, boxShadow: '0 6px 20px rgba(255,107,31,.35)' }}>
          <Flame size={14} strokeWidth={2.5} />
          {savedGas ? '同步中⋯' : '立即同步'}

      </SettingsGroup>

      <SettingsGroup label="個人">
        <SettingField label="姓名">
          <input value={name} onChange={e => setName(e.target.value)}
            className="flex-1 text-xl font-bold bg-transparent outline-none" style={{ color: C.ink }} />
        </SettingField>
        <SettingField label="身高" unit="cm">
          <input type="number" inputMode="decimal" value={height} onChange={e => setHeight(e.target.value)}
            className="flex-1 disp text-xl font-bold num bg-transparent outline-none" style={{ color: C.ink }} />
        </SettingField>
      </SettingsGroup>

      <SettingsGroup label="體重目標">
        <SettingField label="目前體重 (選填)" unit="kg">
          <input type="number" step="0.1" inputMode="decimal" value={start} onChange={e => setStart(e.target.value)} placeholder="未設定"
            className="flex-1 disp text-xl font-bold num bg-transparent outline-none" style={{ color: C.ink }} />
        </SettingField>
        <SettingField label="目標體重" unit="kg" right={tgtSugg && (
          <button onClick={() => setTarget(tgtSugg.recommended.toString())}
            className="text-[10px] num flex items-center gap-1 upper font-bold" style={{ color: C.flame }}>
            <Zap size={9} /> 建議 {tgtSugg.recommended}
          </button>
        )}>
          <input type="number" step="0.1" inputMode="decimal" value={target} onChange={e => setTarget(e.target.value)}
            className="flex-1 disp text-xl font-bold num bg-transparent outline-none" style={{ color: C.ink }} />
        </SettingField>
      </SettingsGroup>

      <SettingsGroup label="每日參考值">
        <SettingField label="熱量" unit="kcal" right={calSugg && (
          <button onClick={() => setCalorieGoal(calSugg.toString())}
            className="text-[10px] num flex items-center gap-1 upper font-bold" style={{ color: C.flame }}>
            <Zap size={9} /> 建議 {calSugg}

          <input type="number" inputMode="numeric" value={calorieGoal} onChange={e => setCalorieGoal(e.target.value)}
            className="flex-1 disp text-xl font-bold num bg-transparent outline-none" style={{ color: C.ink }} />
        </SettingField>
        <SettingField label="鈉" unit="mg">
          <input type="number" inputMode="numeric" value={sodiumGoal} onChange={e => setSodiumGoal(e.target.value)}
            className="flex-1 disp text-xl font-bold num bg-transparent outline-none" style={{ color: C.ink }} />
        </SettingField>
        <SettingField label="糖" unit="g">
          <input type="number" inputMode="decimal" value={sugarGoal} onChange={e => setSugarGoal(e.target.value)}
            className="flex-1 disp text-xl font-bold num bg-transparent outline-none" style={{ color: C.ink }} />
        </SettingField>
        <SettingField label="喝水" unit="cc">
          <input type="number" inputMode="numeric" value={waterGoal} onChange={e => setWaterGoal(e.target.value)}
            className="flex-1 disp text-xl font-bold num bg-transparent outline-none" style={{ color: C.ink }} />
        </SettingField>
      </SettingsGroup>

      <div className="mt-6">
        <div className="text-[11px] upper font-semibold mb-2" style={{ color: C.mute }}>資料</div>
        <div className="rounded-xl p-5 text-sm space-y-2" style={{ background: C.card, border: `1px solid ${C.border}`, color: C.ink }}>
          <DataRow label="體重紀錄" value={`${entries.length} 筆`} />
          <DataRow label="飲食紀錄" value={`${diaryDays} 天`} />
          {goal?.startDate && <DataRow label="開始日期" value={fmtDate(goal.startDate, true)} />}
        </div>
      </div>

      <div className="mt-6">
        {!confirmReset ? (
          <button onClick={() => setConfirmReset(true)} className="w-full py-3 text-sm rounded-xl font-semibold upper"
            style={{ color: C.ember, border: `1px solid ${C.border}`, background: C.card }}>
            清除所有資料
          </button>
        ) : (
          <div className="rounded-xl p-5" style={{ background: C.card, border: `1px solid ${C.ember}` }}>
            <div className="text-sm font-bold mb-3" style={{ color: C.ember }}>確定要刪除全部紀錄嗎？此動作無法復原。</div>
            <div className="flex gap-2">
              <button onClick={() => setConfirmReset(false)} className="flex-1 py-2.5 text-sm rounded-lg font-semibold" style={{ background: C.cardSoft, color: C.ink }}>取消</button>
              <button onClick={() => { onReset(); setConfirmReset(false); }} className="flex-1 py-2.5 text-sm rounded-lg font-bold text-white" style={{ background: C.ember }}>確定刪除</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function SettingsGroup({ label, children }) {
  return (
    <div className="mb-5">
      <div className="text-[11px] upper font-semibold mb-2" style={{ color: C.mute }}>{label}</div>
      <div className="rounded-xl p-5 space-y-4" style={{ background: C.card, border: `1px solid ${C.border}` }}>
        {children}
      </div>
    </div>
  );
}

function SettingField({ label, unit, right, children }) {
  return (
    <div>
      <div className="flex items-baseline justify-between">
        <label className="text-[10px] upper font-semibold" style={{ color: C.mute }}>{label}</label>
        {right}
      </div>
      <div className="flex items-baseline gap-2 mt-1.5 pb-2" style={{ borderBottom: `1px solid ${C.borderSoft}` }}>
        {children}
        {unit && <div className="text-sm" style={{ color: C.mute }}>{unit}</div>}
      </div>
    </div>
  );
}

function DataRow({ label, value }) {
  return (
    <div className="flex justify-between">
      <span style={{ color: C.mute }}>{label}</span>
      <span className="num font-semibold">{value}</span>
    </div>
  );
}

// ============================================================
// EXPORT VIEW (PDF print + Excel)
// ============================================================
function ExportView({ goal, entries, diary, from, setFrom, to, setTo, onBack, showToast }) {
  const inRange = (date) => date >= from && date <= to;

  const filtered = useMemo(() => {
    const w = entries.filter(e => inRange(e.date)).sort((a, b) => a.date.localeCompare(b.date));
    const days = Object.keys(diary || {}).filter(d => inRange(d)).sort();
    const diaryRows = days.map(d => ({ date: d, ...diary[d] }));
    return { weights: w, diary: diaryRows, days };
  }, [entries, diary, from, to]);

  const printReport = () => {
    window.print();
  };

  const exportExcel = () => {
    try {
      const wb = XLSX.utils.book_new();

      // Sheet 1: Summary
      const summaryRows = [
        ['健康日誌 匯出資料'],
        [],
        ['姓名', goal?.name || ''],
        ['身高 (cm)', goal?.height || ''],
        ['目標體重 (kg)', goal?.targetWeight || ''],
        ['起始體重 (kg)', goal?.startWeight ?? ''],
        ['日期範圍', `${from} ~ ${to}`],
        ['每日熱量目標 (kcal)', goal?.calorieGoal || DEFAULT_CALORIE_GOAL],
        ['每日鈉目標 (mg)', goal?.sodiumGoal || DEFAULT_SODIUM_GOAL],
        ['每日糖目標 (g)', goal?.sugarGoal || DEFAULT_SUGAR_GOAL],
        ['每日喝水目標 (cc)', goal?.waterGoal || DEFAULT_WATER_GOAL],
      ];
      const wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
      wsSummary['!cols'] = [{ wch: 22 }, { wch: 28 }];
      XLSX.utils.book_append_sheet(wb, wsSummary, '摘要');

      // Sheet 2: Weight log
      if (filtered.weights.length) {
        const wRows = [['日期', '星期', '體重 (kg)', '備註'],
          ...filtered.weights.map(e => [e.date, '星期' + dayOfWeek(e.date), e.weight, e.note || ''])];
        const wsW = XLSX.utils.aoa_to_sheet(wRows);
        wsW['!cols'] = [{ wch: 12 }, { wch: 8 }, { wch: 10 }, { wch: 40 }];
        XLSX.utils.book_append_sheet(wb, wsW, '體重');
      }

      // Sheet 3: Meals
      const mealRows = [['日期', '星期', '名稱', '時間', '吃了什麼', '熱量(kcal)', '鈉(mg)', '糖(g)']];
      filtered.diary.forEach(d => {
        (d.meals || []).forEach(m => {
          mealRows.push([d.date, '星期'+dayOfWeek(d.date), m.name||'', m.time||'', m.content||'',
            m.calories||0, m.sodium||0, m.sugar||0]);
        });
      });
      if (mealRows.length > 1) {
        const wsM = XLSX.utils.aoa_to_sheet(mealRows);
        wsM['!cols'] = [{ wch: 12 }, { wch: 8 }, { wch: 10 }, { wch: 8 }, { wch: 40 }, { wch: 12 }, { wch: 10 }, { wch: 10 }];
        XLSX.utils.book_append_sheet(wb, wsM, '餐點');
      }

      // Sheet 4: Drinks
      const drinkRows = [['日期', '星期', '名稱', '容量(cc)', '時間', '熱量(kcal)', '鈉(mg)', '糖(g)']];
      filtered.diary.forEach(d => {
        (d.drinks || []).forEach(dr => {
          drinkRows.push([d.date, '星期'+dayOfWeek(d.date), dr.name||'', dr.amount||0, dr.time||'',
            dr.calories||0, dr.sodium||0, dr.sugar||0]);
        });
      });
      if (drinkRows.length > 1) {
        const wsD = XLSX.utils.aoa_to_sheet(drinkRows);
        wsD['!cols'] = [{ wch: 12 }, { wch: 8 }, { wch: 18 }, { wch: 10 }, { wch: 8 }, { wch: 12 }, { wch: 10 }, { wch: 10 }];
        XLSX.utils.book_append_sheet(wb, wsD, '飲料');
      }

      // Sheet 5: Water & daily totals
      const dailyRows = [['日期', '星期', '喝水(cc)', '熱量總計(kcal)', '鈉總計(mg)', '糖總計(g)']];
      filtered.diary.forEach(d => {
        const sum = (items, key) => (items || []).reduce((s, x) => s + (parseFloat(x[key]) || 0), 0);
        const cal = sum(d.meals, 'calories') + sum(d.drinks, 'calories');
        const sod = sum(d.meals, 'sodium') + sum(d.drinks, 'sodium');
        const sug = sum(d.meals, 'sugar') + sum(d.drinks, 'sugar');
        dailyRows.push([d.date, '星期'+dayOfWeek(d.date), d.water||0, Math.round(cal), Math.round(sod), Math.round(sug*10)/10]);
      });
      if (dailyRows.length > 1) {
        const wsDay = XLSX.utils.aoa_to_sheet(dailyRows);
        wsDay['!cols'] = [{ wch: 12 }, { wch: 8 }, { wch: 12 }, { wch: 14 }, { wch: 12 }, { wch: 12 }];
        XLSX.utils.book_append_sheet(wb, wsDay, '每日總計');
      }

      const fileName = `健康日誌_${from}_${to}.xlsx`;
      XLSX.writeFile(wb, fileName);
      showToast('已下載 Excel');
    } catch (e) {
      console.error(e);
      showToast('匯出失敗');
    }
  };

  // Summary for preview
  const sum = (items, key) => (items || []).reduce((s, x) => s + (parseFloat(x[key]) || 0), 0);
  const totalCal = filtered.diary.reduce((s, d) => s + sum(d.meals, 'calories') + sum(d.drinks, 'calories'), 0);
  const avgCal = filtered.days.length ? Math.round(totalCal / filtered.days.length) : 0;

  return (
    <>
      <div className="slide-up">
        <div className="flex items-center justify-between mb-6">
          <button onClick={onBack} className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ background: C.card, border: `1px solid ${C.border}` }}>
            <X size={16} style={{ color: C.inkSoft }} />
          </button>
          <div className="disp text-xl font-bold">匯出資料</div>
          <div className="w-9" />
        </div>

        <div className="rounded-xl p-5 mb-5" style={{ background: C.card, border: `1px solid ${C.border}` }}>
          <div className="text-[11px] upper font-semibold mb-3" style={{ color: C.mute }}>日期範圍</div>
          <div className="space-y-3">
            <div>
              <div className="text-[10px] upper mb-1" style={{ color: C.dim }}>從</div>
              <input type="date" value={from} max={to} onChange={e => setFrom(e.target.value)}
                className="w-full disp text-lg font-bold num bg-transparent outline-none pb-1.5"
                style={{ borderBottom: `1.5px solid ${C.border}`, color: C.ink }} />
            </div>
            <div>
              <div className="text-[10px] upper mb-1" style={{ color: C.dim }}>到</div>
              <input type="date" value={to} min={from} max={todayStr()} onChange={e => setTo(e.target.value)}
                className="w-full disp text-lg font-bold num bg-transparent outline-none pb-1.5"
                style={{ borderBottom: `1.5px solid ${C.border}`, color: C.ink }} />
            </div>
          </div>
          <div className="flex gap-2 mt-4">
            {[{ d: 7, l: '7天' }, { d: 30, l: '30天' }, { d: 90, l: '90天' }].map(p => (
              <button key={p.d} onClick={() => { setFrom(shiftDate(todayStr(), -(p.d - 1))); setTo(todayStr()); }}
                className="flex-1 py-2 text-xs rounded-lg font-semibold" style={{ background: C.cardSoft, color: C.inkSoft, border: `1px solid ${C.borderSoft}` }}>
                {p.l}
              </button>
            ))}
          </div>
        </div>

        <div className="rounded-xl p-5 mb-5" style={{ background: C.card, border: `1px solid ${C.border}` }}>
          <div className="text-[11px] upper font-semibold mb-3" style={{ color: C.mute }}>預覽</div>
          <div className="space-y-2 text-sm">
            <DataRow label="體重紀錄" value={`${filtered.weights.length} 筆`} />
            <DataRow label="有紀錄的天數" value={`${filtered.days.length} 天`} />
            <DataRow label="平均日熱量" value={avgCal > 0 ? `${avgCal} kcal` : '—'} />
          </div>
        </div>

        <div className="space-y-3">
          <button onClick={printReport}
            className="w-full py-4 rounded-xl font-bold text-white upper flex items-center justify-center gap-2"
            style={{ background: C.flame, boxShadow: '0 6px 20px rgba(255,107,31,.35)' }}>
            <Printer size={16} strokeWidth={2.5} />
            列印 / 儲存 PDF
          </button>
          <div className="text-[10px] text-center mt-2" style={{ color: C.dim }}>
            列印對話框中可選「儲存為 PDF」
          </div>
        </div>
      </div>
    </>
  );
}

function PrintArea({ goal, from, to, weights, diary }) {
  const sum = (items, key) => (items || []).reduce((s, x) => s + (parseFloat(x[key]) || 0), 0);
  return (
    <div className="print-area" style={{ display: 'none' }}>
      <h1>健康日誌</h1>
      <div className="meta">
        {goal?.name && <span>{goal.name}　·　</span>}
        日期範圍：{from} ~ {to}　·　列印於 {todayStr()}
      </div>

      <h2>個人資料</h2>
      <table>
        <tbody>
          <tr><th>姓名</th><td>{goal?.name || '—'}</td></tr>
          <tr><th>身高</th><td>{goal?.height ? `${goal.height} cm` : '—'}</td></tr>
          <tr><th>目標體重</th><td>{goal?.targetWeight ? `${goal.targetWeight} kg` : '—'}</td></tr>
          <tr><th>起始體重</th><td>{goal?.startWeight ? `${goal.startWeight} kg` : '—'}</td></tr>
          <tr><th>每日參考</th><td>熱量 {goal?.calorieGoal || DEFAULT_CALORIE_GOAL} kcal · 鈉 {goal?.sodiumGoal || DEFAULT_SODIUM_GOAL} mg · 糖 {goal?.sugarGoal || DEFAULT_SUGAR_GOAL} g · 水 {goal?.waterGoal || DEFAULT_WATER_GOAL} cc</td></tr>
        </tbody>
      </table>

      {weights.length > 0 && (
        <>
          <h2>體重紀錄</h2>
          <table>
            <thead><tr><th>日期</th><th>星期</th><th>體重 (kg)</th><th>備註</th></tr></thead>
            <tbody>
              {weights.map(e => (
                <tr key={e.id}>
                  <td>{e.date}</td>
                  <td>{dayOfWeek(e.date)}</td>
                  <td>{e.weight.toFixed(1)}</td>
                  <td>{e.note || ''}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </>
      )}

      <h2>飲食日誌</h2>
      {diary.length === 0 ? (
        <div className="meta">範圍內無飲食紀錄</div>
      ) : diary.map(d => {
        const cal = sum(d.meals, 'calories') + sum(d.drinks, 'calories');
        const sod = sum(d.meals, 'sodium') + sum(d.drinks, 'sodium');
        const sug = sum(d.meals, 'sugar') + sum(d.drinks, 'sugar');
        return (
          <div key={d.date} className="day-block">
            <h3>{d.date} 星期{dayOfWeek(d.date)}</h3>
            <div className="meta">
              熱量 {Math.round(cal)} kcal · 鈉 {Math.round(sod)} mg · 糖 {Math.round(sug*10)/10} g · 水 {d.water || 0} cc
            </div>
            {(d.meals?.length > 0 || d.drinks?.length > 0) && (
              <table>
                <thead><tr><th>類型</th><th>名稱</th><th>時間</th><th>內容 / 容量</th><th>熱量</th><th>鈉</th><th>糖</th></tr></thead>
                <tbody>
                  {(d.meals || []).map(m => (
                    <tr key={'m'+m.id}>
                      <td>餐點</td><td>{m.name}</td><td>{m.time||''}</td>
                      <td>{m.content || ''}</td>
                      <td>{m.calories || ''}</td><td>{m.sodium || ''}</td><td>{m.sugar || ''}</td>
                    </tr>
                  ))}
                  {(d.drinks || []).map(dr => (
                    <tr key={'d'+dr.id}>
                      <td>飲料</td><td>{dr.name}</td><td>{dr.time||''}</td>
                      <td>{dr.amount} cc</td>
                      <td>{dr.calories || ''}</td><td>{dr.sodium || ''}</td><td>{dr.sugar || ''}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        );
      })}
    </div>
  );
}


createRoot(document.getElementById('root')).render(<WeightTracker />);

if (window.__hideLoader) setTimeout(window.__hideLoader, 0);
